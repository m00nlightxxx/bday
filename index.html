<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>For you</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
      color: #263326;
      background: #e8f0e7;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.85), transparent 23%),
        radial-gradient(circle at 82% 76%, rgba(255,255,255,0.55), transparent 28%),
        linear-gradient(135deg, #dceee5, #bad6cb, #f8f1e7);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background: radial-gradient(circle, rgba(255,255,255,0.38) 2px, transparent 3px);
      background-size: 58px 58px;
      animation: waterMove 16s linear infinite;
      opacity: 0.45;
      z-index: 0;
    }

    .lily {
      position: fixed;
      z-index: 1;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 8px 20px rgba(70, 100, 80, 0.18);
      animation: float 6s ease-in-out infinite;
      user-select: none;
      pointer-events: none;
    }

    .l1 { top: 8%; left: 9%; font-size: 44px; }
    .l2 { top: 18%; right: 13%; font-size: 32px; animation-delay: 1.5s; }
    .l3 { bottom: 14%; right: 10%; font-size: 48px; animation-delay: 2.8s; }
    .l4 { bottom: 20%; left: 12%; font-size: 35px; animation-delay: 4s; }

    .sparkle {
      position: fixed;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      z-index: 1;
      animation: sparkle 3s ease-in-out infinite;
    }

    .s1 { top: 30%; left: 24%; }
    .s2 { top: 62%; left: 74%; animation-delay: 1s; }
    .s3 { top: 44%; left: 84%; animation-delay: 1.8s; }
    .s4 { top: 76%; left: 32%; animation-delay: 2.4s; }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      z-index: 2;
      overflow-y: auto;
    }

    .scene.active {
      opacity: 1;
      pointer-events: auto;
    }

    .card {
      width: min(92vw, 820px);
      padding: 38px 30px;
      border-radius: 34px;
      text-align: center;
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 30px 80px rgba(50, 80, 65, 0.24);
      animation: cardFloat 4.5s ease-in-out infinite;
    }

    .tiny-title {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #687a67;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 16px;
      font-weight: normal;
      font-size: clamp(32px, 6vw, 50px);
      letter-spacing: 0.3px;
    }

    h2 {
      margin: 0 0 18px;
      font-weight: normal;
      font-size: clamp(26px, 5vw, 38px);
    }

    p {
      max-width: 540px;
      margin: 0 auto 22px;
      font-size: 17px;
      line-height: 1.7;
      color: #3b473b;
    }

    .flower {
      font-size: 48px;
      margin-bottom: 12px;
      animation: pulse 3s ease-in-out infinite;
    }

    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 26px;
    }

    .menu button,
    .main-button,
    .back-button,
    .small-button {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
      color: white;
      background: #5f7f62;
      box-shadow: 0 12px 26px rgba(60, 90, 70, 0.25);
      transition: transform 0.25s ease, background 0.25s ease;
    }

    button:hover {
      transform: translateY(-2px);
      background: #516f55;
    }

    .menu button {
      min-height: 64px;
      background: rgba(95, 127, 98, 0.92);
    }

    .menu button span {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }

    .back-button,
    .small-button {
      margin-top: 16px;
      background: transparent;
      color: #4d684f;
      border: 1px solid rgba(77, 104, 79, 0.35);
      box-shadow: none;
      padding: 11px 20px;
    }

    .back-button:hover,
    .small-button:hover {
      background: rgba(255,255,255,0.45);
    }

    .video-wrap {
      width: min(92vw, 780px);
      padding: 14px;
      border-radius: 32px;
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(14px);
      box-shadow: 0 30px 80px rgba(40, 65, 55, 0.28);
      border: 1px solid rgba(255,255,255,0.85);
      text-align: center;
    }

    video {
      width: 100%;
      display: block;
      border-radius: 24px;
      background: black;
    }

    .video-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .note-box {
      margin: 20px auto 0;
      padding: 18px;
      max-width: 540px;
      border-radius: 24px;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.75);
      color: #3b473b;
      font-size: 16px;
      line-height: 1.7;
    }

    .mini-list {
      max-width: 540px;
      margin: 18px auto 0;
      display: grid;
      gap: 12px;
    }

    .mini-item {
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.46);
      border: 1px solid rgba(255,255,255,0.75);
      font-size: 16px;
      color: #3b473b;
    }

    .signature {
      margin-top: 22px;
      color: #6b786b;
      font-size: 14px;
    }

    /* Interactive cards */
    .choice-grid {
      max-width: 620px;
      margin: 24px auto 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .choice-card {
      min-height: 100px;
      border: none;
      border-radius: 24px;
      padding: 18px 12px;
      background: rgba(255,255,255,0.56);
      color: #3b473b;
      box-shadow: 0 12px 26px rgba(60, 90, 70, 0.14);
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      transition: 0.25s ease;
    }

    .choice-card span {
      display: block;
      font-size: 32px;
      margin-bottom: 8px;
    }

    .choice-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.84);
    }

    /* Sock drawer */
    .drawer {
      margin: 24px auto;
      max-width: 520px;
      padding: 18px;
      border-radius: 26px;
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(255,255,255,0.8);
    }

    .drawer-handle {
      width: 80px;
      height: 8px;
      border-radius: 999px;
      background: rgba(77, 104, 79, 0.35);
      margin: 0 auto 18px;
    }

    .sock-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .sock {
      border: none;
      border-radius: 22px;
      padding: 18px 10px;
      font-size: 30px;
      cursor: pointer;
      background: rgba(255,255,255,0.62);
      box-shadow: 0 10px 22px rgba(60, 90, 70, 0.14);
      transition: 0.25s ease;
    }

    .sock:hover {
      transform: translateY(-4px) rotate(-2deg);
      background: rgba(255,255,255,0.85);
    }

    /* Suxhuk */
    .picnic-box {
      margin: 24px auto;
      max-width: 440px;
      padding: 24px;
      border-radius: 28px;
      background: rgba(255,255,255,0.48);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 16px 34px rgba(60, 90, 70, 0.16);
    }

    .suxhuk-area {
      display: none;
      margin-top: 22px;
      animation: fadeGameMessage 0.8s ease forwards;
    }

    .suxhuk {
      font-size: 58px;
      margin: 16px 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .suxhuk.cut {
      transform: rotate(-8deg) scale(0.96);
      opacity: 0.55;
    }

    .suxhuk-slices {
      display: none;
      margin-top: 16px;
      font-size: 34px;
      animation: sliceAppear 0.8s ease forwards;
    }

    /* Ludo */
    .turn-box {
      margin: 14px auto 8px;
      padding: 12px 18px;
      width: fit-content;
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.85);
      color: #3f563f;
      font-size: 16px;
    }

    .dice {
      font-size: 42px;
      margin: 10px 0 18px;
      animation: pulse 2.4s ease-in-out infinite;
    }

    .ludo-cross {
      width: min(82vw, 520px);
      height: min(82vw, 520px);
      margin: 24px auto;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      gap: 5px;
    }

    .cross-cell {
      border-radius: 13px;
      background: rgba(255,255,255,0.46);
      border: 1px solid rgba(255,255,255,0.82);
      box-shadow: 0 7px 16px rgba(60, 90, 70, 0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4d684f;
      font-size: 11px;
      position: relative;
      overflow: hidden;
    }

    .cross-cell.empty {
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .cross-cell.center {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(95, 127, 98, 0.45);
      font-weight: bold;
      color: #4d684f;
    }

    .cross-cell.start1 {
      background: rgba(95, 127, 98, 0.28);
    }

    .cross-cell.start2 {
      background: rgba(125, 115, 155, 0.25);
    }

    .ludo-piece {
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 17px;
      cursor: pointer;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 8px 18px rgba(50, 70, 60, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ludo-piece.available {
      outline: 3px solid rgba(95, 127, 98, 0.75);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .ludo-piece.p1 {
      background: #dfeee5;
    }

    .ludo-piece.p2 {
      background: #ece8f6;
    }

    .ludo-piece:disabled {
      cursor: default;
      opacity: 0.88;
    }

    .ludo-stack {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .game-message {
      display: none;
      animation: fadeGameMessage 0.8s ease forwards;
    }

    @keyframes waterMove {
      from { transform: translate(0,0); }
      to { transform: translate(-58px,-58px); }
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-16px) rotate(4deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.07); opacity: 0.85; }
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(0.5); opacity: 0.2; }
      50% { transform: scale(1.4); opacity: 1; }
    }

    @keyframes fadeGameMessage {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes sliceAppear {
      from { opacity: 0; transform: translateY(12px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 560px) {
      .card {
        padding: 34px 22px;
      }

      p {
        font-size: 16px;
      }

      .menu {
        grid-template-columns: 1fr;
      }

      .choice-grid {
        grid-template-columns: 1fr;
      }

      .sock-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .video-wrap {
        padding: 9px;
        border-radius: 24px;
      }

      video {
        border-radius: 18px;
      }

      .ludo-cross {
        width: min(92vw, 360px);
        height: min(92vw, 360px);
        gap: 4px;
      }

      .ludo-piece {
        width: 24px;
        height: 24px;
        font-size: 14px;
      }

      .cross-cell {
        border-radius: 9px;
        font-size: 9px;
      }
    }
  </style>
</head>

<body>
  <div class="lily l1">❀</div>
  <div class="lily l2">✿</div>
  <div class="lily l3">❁</div>
  <div class="lily l4">❀</div>

  <div class="sparkle s1"></div>
  <div class="sparkle s2"></div>
  <div class="sparkle s3"></div>
  <div class="sparkle s4"></div>

  <audio id="song" src="song.mp3" preload="auto" loop></audio>

  <!-- MAIN PAGE -->
  <section class="scene active" id="main">
    <div class="card">
      <div class="flower">🤍</div>
      <div class="tiny-title">a small birthday thing</div>
      <h1>For you</h1>

      <p>
        I made you a little place with a short story, flowers,
        a song, a tiny game, and some small things to open.
      </p>

      <button class="main-button" onclick="startExperience()">Start</button>

      <div class="menu" id="menu" style="display: none;">
        <button onclick="openVideo()"><span>🎬</span>play the little movie</button>
        <button onclick="showScene('message')"><span>💌</span>open the note</button>
        <button onclick="showScene('flowers')"><span>❀</span>flowers</button>
        <button onclick="showScene('songPage')"><span>🎧</span>our song</button>
        <button onclick="showScene('gamePage')"><span>🎲</span>birthday ludo</button>
        <button onclick="showScene('sockDrawer')"><span>🧦</span>sock drawer</button>
        <button
